name: Build APK with Capacitor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create web directory and copy files
        run: |
          mkdir -p www
          cp index.html www/
          # If you have other static files (CSS, JS, images), copy them too
          # cp -r styles www/  (example)

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/core @capacitor/cli
          npm install @capacitor/android

      - name: Initialize Capacitor
        run: npx cap init NursePrep com.nurseprep.app --web-dir www

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web assets
        run: npx cap copy

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nurseprep-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
