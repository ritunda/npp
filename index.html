<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#0891b2">
    <meta name="description" content="NursePrep Pro - Collaborative nursing past papers with working answers, rationales & quizzes">
    <title>NursePrep Pro | Collaborative Past Papers</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://via.placeholder.com/192x192/0891b2/ffffff?text=NP" type="image/png">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180x180/0891b2/ffffff?text=NP">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; }
        body.dark { background: #0f172a; color: #e2e8f0; }
        
        .minimal-header { background: white; padding: 10px 16px; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        body.dark .minimal-header { background: #1e293b; border-bottom-color: #334155; }
        .header-row { display: flex; align-items: center; justify-content: space-between; max-width: 800px; margin: 0 auto; }
        .logo-mini { display: flex; align-items: center; gap: 10px; }
        .logo-icon-mini { width: 36px; height: 36px; background: linear-gradient(135deg, #0891b2, #06b6d4); border-radius: 10px; display: flex; align-items: center; justify-content: center; }

        .logo-text-mini h1 { font-size: 16px; font-weight: 700; color: #0891b2; }
        body.dark .logo-text-mini h1 { color: #22d3ee; }
        .logo-text-mini p { font-size: 10px; color: #64748b; }
        .header-actions-mini { display: flex; gap: 8px; }
        .icon-btn-mini { width: 36px; height: 36px; border-radius: 18px; background: #f1f5f9; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #1e293b; }
        body.dark .icon-btn-mini { background: #334155; color: #e2e8f0; }
        
        .main-container { max-width: 800px; margin: 0 auto; padding: 16px; }
        .tab-bar { display: flex; gap: 6px; background: white; padding: 6px; border-radius: 60px; margin-bottom: 20px; }
        body.dark .tab-bar { background: #1e293b; }
        .tab-btn { flex: 1; padding: 10px 0; border: none; background: transparent; border-radius: 40px; font-weight: 600; font-size: 12px; cursor: pointer; color: #64748b; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .tab-btn.active { background: #0891b2; color: white; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        
        .filter-bar { background: white; border-radius: 20px; padding: 12px; margin-bottom: 16px; }
        body.dark .filter-bar { background: #1e293b; }
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .filter-select { flex: 1; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 40px; background: white; font-size: 12px; }
        body.dark .filter-select { background: #0f172a; border-color: #334155; color: white; }
        .search-mini { width: 100%; padding: 10px 12px 10px 36px; border: 1px solid #e2e8f0; border-radius: 40px; font-size: 13px; background: white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="%2394a3b8"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>') no-repeat 12px center; background-size: 16px; }
        
        .stats-bar { display: flex; gap: 12px; margin-bottom: 16px; }
        .stat-mini { flex: 1; background: white; border-radius: 16px; padding: 12px; text-align: center; }
        body.dark .stat-mini { background: #1e293b; }
        .stat-num { font-size: 22px; font-weight: 800; color: #0891b2; }
        .stat-label { font-size: 10px; color: #64748b; }
        
        .block-section { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 12px; }
        body.dark .block-section { background: #1e293b; }
        .block-header { background: #f1f5f9; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        body.dark .block-header { background: #334155; }
        .block-title { font-weight: 700; font-size: 14px; display: flex; gap: 8px; }
        .paper-count { background: #0891b2; color: white; padding: 2px 8px; border-radius: 20px; font-size: 10px; }
        .block-content { display: none; padding: 12px; }
        .block-content.show { display: block; }
        .paper-item { background: #f8fafc; border-radius: 14px; padding: 12px; margin-bottom: 10px; position: relative; }
        body.dark .paper-item { background: #0f172a; }
        .paper-header-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .paper-name { font-weight: 700; font-size: 14px; color: #0891b2; }
        .paper-intake { font-size: 10px; background: #e2e8f0; padding: 2px 8px; border-radius: 12px; }
        .paper-progress { font-size: 11px; color: #64748b; margin-top: 4px; }
        .view-btn { background: transparent; border: 1px solid #0891b2; padding: 8px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; color: #0891b2; cursor: pointer; width: 100%; margin-top: 10px; }
        .delete-btn { position: absolute; top: 12px; right: 12px; background: #ef4444; color: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 14px; cursor: pointer; display: none; }
        .paper-item.local .delete-btn { display: flex; align-items: center; justify-content: center; }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 16px; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 28px; max-width: 550px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 24px; }
        body.dark .modal-content { background: #1e293b; }
        .single-question { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .question-text-full { font-weight: 600; font-size: 16px; line-height: 1.5; margin-bottom: 12px; }
        .favorite-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #cbd5e1; margin-left: 10px; }
        .favorite-btn.favorited { color: #ef4444; }
        .reveal-q { background: #f1f5f9; border: none; padding: 10px 20px; border-radius: 40px; font-size: 13px; font-weight: 600; color: #0891b2; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        body.dark .reveal-q { background: #334155; color: #22d3ee; }
        .answer-full { background: #f8fafc; padding: 16px; border-radius: 16px; margin-top: 12px; display: none; border-left: 4px solid #0891b2; line-height: 1.6; font-size: 14px; }
        body.dark .answer-full { background: #0f172a; }
        .answer-full.show { display: block; }
        .rationale { margin-top: 12px; padding: 12px; background: #dbeafe; border-radius: 12px; font-size: 13.5px; border-left: 4px solid #3b82f6; }
        body.dark .rationale { background: #1e3a8a; }
        .progress-btns { display: flex; gap: 10px; margin-top: 16px; }
        .progress-btn-sm { flex: 1; padding: 8px; border: none; border-radius: 30px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .progress-attempted { background: #fef3c7; color: #d97706; }
        .progress-reviewed { background: #dcfce7; color: #16a34a; }
        .progress-mastered { background: #dbeafe; color: #2563eb; }
        .close-modal, .print-btn { background: #e2e8f0; border: none; padding: 12px; border-radius: 40px; font-weight: 600; width: 100%; margin-top: 16px; cursor: pointer; }
        body.dark .close-modal, body.dark .print-btn { background: #334155; color: white; }
        .quiz-btn { background: linear-gradient(135deg, #0891b2, #06b6d4); color: white; border: none; padding: 14px; border-radius: 40px; font-weight: 700; width: 100%; margin: 12px 0; cursor: pointer; }
        .submit-to-sheet-btn { background: linear-gradient(135deg, #10b981, #34d399); color: white; border: none; padding: 14px; border-radius: 40px; font-weight: 700; width: 100%; margin-top: 12px; cursor: pointer; }
        .loading-spinner { text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #0891b2; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .add-form { background: white; border-radius: 24px; padding: 20px; }
        body.dark .add-form { background: #1e293b; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 12px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 16px; font-family: inherit; font-size: 14px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #0891b2, #06b6d4); border: none; border-radius: 40px; color: white; font-weight: 700; cursor: pointer; }
        .add-question-btn { background: #e2e8f0; border: none; padding: 10px; border-radius: 40px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 16px; }
        .question-entry { background: #f8fafc; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        body.dark .question-entry { background: #0f172a; }
        .remove-q { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; margin-top: 10px; }
        .success-msg { background: #dcfce7; color: #16a34a; padding: 12px; border-radius: 16px; margin-bottom: 16px; display: none; }
        
        .progress-actions { display: flex; gap: 8px; margin-bottom: 16px; }
        .action-btn { flex: 1; padding: 10px; border-radius: 40px; font-weight: 600; font-size: 13px; cursor: pointer; border: none; }
        
        #installPrompt { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 16px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; z-index: 2000; max-width: 320px; text-align: center; }
        body.dark #installPrompt { background: #1e293b; }
    </style>
</head>
<body>
    <div class="minimal-header">
        <div class="header-row">
            <div class="logo-mini">
                <div class="logo-icon-mini"><i class="fas fa-stethoscope"></i></div>
                <div class="logo-text-mini">
                    <h1>NursePrep Pro</h1>
                    <p>Collaborative Past Papers</p>
                </div>
            </div>
            <div class="header-actions-mini">
                <button class="icon-btn-mini" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
                <button class="icon-btn-mini" onclick="shareApp()"><i class="fas fa-share-alt"></i></button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="papers"><i class="fas fa-book"></i> Papers</button>
            <button class="tab-btn" data-tab="add"><i class="fas fa-plus-circle"></i> Add</button>
            <button class="tab-btn" data-tab="progress"><i class="fas fa-chart-line"></i> Progress</button>
        </div>

        <div id="papersTab" class="tab-pane active">
            <div class="filter-bar">
                <div class="filter-row">
                    <select id="blockFilter" class="filter-select" onchange="filterPapers()">
                        <option value="all">All Blocks</option>
                        <option value="block1">Block 1</option><option value="block2">Block 2</option>
                        <option value="block3">Block 3</option><option value="block4">Block 4</option>
                        <option value="block5">Block 5</option><option value="block6">Block 6</option>
                        <option value="supplementary">Supplementary</option>
                    </select>
                    <select id="intakeFilter" class="filter-select" onchange="filterPapers()">
                        <option value="all">All Intakes</option>
                        <option value="march">March</option>
                        <option value="september">September</option>
                    </select>
                    <select id="yearFilter" class="filter-select" onchange="filterPapers()">
                        <option value="all">All Years</option>
                        <option value="2024">2024</option><option value="2023">2023</option>
                    </select>
                </div>
                <input type="text" id="searchInput" class="search-mini" placeholder="Search questions...">
            </div>
            <button class="quiz-btn" onclick="startRandomQuiz()"><i class="fas fa-random"></i> Start Random Practice Quiz (10 Questions)</button>
            <button onclick="refreshSheet()" style="background:#64748b;color:white;border:none;padding:10px;border-radius:40px;width:100%;margin-bottom:12px;">↻ Refresh from Google Sheet</button>
            <div id="papersGrid"></div>
        </div>

        <div id="addTab" class="tab-pane">
            <div class="add-form">
                <div id="addSuccessMsg" class="success-msg"><i class="fas fa-check-circle"></i> Paper saved locally!</div>
                <div id="sheetSuccessMsg" class="success-msg" style="background:#dbeafe;color:#1e40af;display:none;"><i class="fas fa-check-circle"></i> Paper submitted for moderation (Pending approval)</div>
                
                <div class="form-row">
                    <div class="form-group"><label>Block</label>
                        <select id="newBlock">
                            <option value="block1">Block 1</option><option value="block2">Block 2</option>
                            <option value="block3">Block 3</option><option value="block4">Block 4</option>
                            <option value="block5">Block 5</option><option value="block6">Block 6</option>
                            <option value="supplementary" selected>Supplementary</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Paper No.</label><input type="text" id="newPaperNo" placeholder="Paper 1"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Intake</label>
                        <select id="newIntake"><option value="march">March</option><option value="september">September</option></select>
                    </div>
                    <div class="form-group"><label>Year</label><input type="text" id="newYear" placeholder="2024"></div>
                </div>
                <div class="form-group"><label>Paper Title</label><input type="text" id="newTitle" placeholder="e.g., Fundamentals of Nursing"></div>
                
                <div id="questionsContainer"></div>
                <button class="add-question-btn" onclick="addQuestionField()"><i class="fas fa-plus"></i> Add Question</button>
                
                <button class="submit-btn" onclick="savePaperLocal()">💾 Save Locally Only</button>
                <button class="submit-to-sheet-btn" onclick="submitToSheet()">
                    <i class="fas fa-cloud-upload-alt"></i> Submit to Shared Sheet (Everyone Can View After Approval)
                </button>
            </div>
        </div>

        <div id="progressTab" class="tab-pane">
            <div class="stats-bar">
                <div class="stat-mini"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Qs</div></div>
                <div class="stat-mini"><div class="stat-num" id="statAttempted">0</div><div class="stat-label">Attempted</div></div>
                <div class="stat-mini"><div class="stat-num" id="statMastered">0</div><div class="stat-label">Mastered</div></div>
            </div>
            <div class="progress-actions">
                <button class="action-btn" style="background:#0891b2;color:white;" onclick="exportProgressCSV()"><i class="fas fa-download"></i> Export Progress</button>
                <button class="action-btn" style="background:#ef4444;color:white;" onclick="clearAllProgress()"><i class="fas fa-trash"></i> Reset All Progress</button>
            </div>
            <div id="progressList"></div>
        </div>
    </div>

    <div id="questionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <p id="modalMeta" style="font-size:12px;color:#64748b;margin-bottom:16px;"></p>
            <div id="modalQuestions"></div>
            <button class="close-modal" onclick="closeQuestionModal()">Close</button>
        </div>
    </div>

    <div id="installPrompt">
        <p><strong>Add NursePrep Pro to Home Screen for fast & offline access?</strong></p>
        <button onclick="installPWA()" style="background:#0891b2;color:white;border:none;padding:12px 24px;border-radius:40px;margin:8px 4px;">Install App</button>
        <button onclick="document.getElementById('installPrompt').style.display='none'" style="background:#e2e8f0;border:none;padding:12px 24px;border-radius:40px;">Not Now</button>
    </div>

    <script>
        const GOOGLE_SHEET_ID = "1She5pa77A5kRnqn6_zHiStN5BYjd5ma2KNZB_oyPmx8";
        const WEB_APP_URL = "https://docs.google.com/spreadsheets/d/16Noic3_QcnowtJhgJaSRSiutPpTjKE5MSBUuSPK9ork/edit?usp=";   // ← REPLACE WITH YOUR ACTUAL APPS SCRIPT WEB APP URL

        let papersDatabase = [];
        let userProgress = JSON.parse(localStorage.getItem('nurseProgress')) || {};
        let favorites = JSON.parse(localStorage.getItem('nurseFavorites')) || [];
        let questionFields = [];
        let deferredPrompt = null;

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(() => console.log('Service Worker registered successfully'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }

        // Install prompt handler
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installPrompt').style.display = 'block';
        });

        function installPWA() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    deferredPrompt = null;
                    document.getElementById('installPrompt').style.display = 'none';
                });
            }
        }

        async function loadFromGoogleSheet() {
            const container = document.getElementById('papersGrid');
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Loading shared papers...</p></div>';
            
            try {
                const csvUrl = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/gviz/tq?tqx=out:csv`;
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                const sheetPapers = parseCSVToPapers(csvText);
                const localPapers = JSON.parse(localStorage.getItem('nurseLocalPapers') || '[]');
                
                papersDatabase = [...sheetPapers, ...localPapers];
                localStorage.setItem('nursePapersCache', JSON.stringify(papersDatabase));
                
                renderPapers();
                updateProgressStats();
                renderProgressList();
            } catch (error) {
                console.error("Load error:", error);
                const cached = localStorage.getItem('nursePapersCache');
                if (cached) papersDatabase = JSON.parse(cached);
                renderPapers();
                updateProgressStats();
                renderProgressList();
            }
        }

        function parseCSVToPapers(csvText) {
            const lines = csvText.split('\n').filter(l => l.trim());
            if (lines.length < 2) return [];

            const headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase());
            const blockIdx = headers.indexOf('block');
            const paperNoIdx = headers.indexOf('paperno') || headers.indexOf('paper no') || headers.indexOf('title');
            const intakeIdx = headers.indexOf('intake');
            const yearIdx = headers.indexOf('year');
            const titleIdx = headers.indexOf('title');
            const questionsIdx = headers.indexOf('questions');
            const answersIdx = headers.indexOf('answers');
            const rationalesIdx = headers.indexOf('rationales');
            const statusIdx = headers.indexOf('status');

            const papersMap = new Map();

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const values = parseCSVLine(lines[i]);

                const status = statusIdx >= 0 ? (values[statusIdx] || '').trim().toLowerCase() : '';
                if (status === 'rejected') continue;

                const block = blockIdx >= 0 ? (values[blockIdx] || 'supplementary') : 'supplementary';
                const paperNo = paperNoIdx >= 0 ? values[paperNoIdx] : `Paper ${i}`;
                const title = titleIdx >= 0 ? values[titleIdx] || paperNo : paperNo;
                const year = yearIdx >= 0 ? values[yearIdx] || '2024' : '2024';

                let qList = [], aList = [], rList = [];
                try {
                    if (questionsIdx >= 0 && values[questionsIdx]) qList = JSON.parse(values[questionsIdx]);
                    if (answersIdx >= 0 && values[answersIdx]) aList = JSON.parse(values[answersIdx]);
                    if (rationalesIdx >= 0 && values[rationalesIdx]) rList = JSON.parse(values[rationalesIdx]);
                } catch(e) {}

                if (qList.length === 0) continue;

                const questions = qList.map((text, idx) => ({
                    text: text || '',
                    answer: aList[idx] || 'Answer not provided',
                    rationale: rList[idx] || ''
                }));

                const id = 100000 + i;

                papersMap.set(id, {
                    id: id,
                    block: block,
                    blockName: block.charAt(0).toUpperCase() + block.slice(1),
                    paperNo: paperNo,
                    intake: intakeIdx >= 0 ? (values[intakeIdx] || 'march') : 'march',
                    year: year,
                    title: title,
                    questions: questions,
                    source: 'sheet'
                });
            }
            return Array.from(papersMap.values());
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else current += char;
            }
            result.push(current.trim());
            return result.map(v => v.replace(/^["']|["']$/g, ''));
        }

        function renderPapers() {
            const blockFilter = document.getElementById('blockFilter').value;
            const intakeFilter = document.getElementById('intakeFilter').value;
            const yearFilter = document.getElementById('yearFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = papersDatabase.filter(p => {
                if (blockFilter !== 'all' && p.block !== blockFilter) return false;
                if (intakeFilter !== 'all' && p.intake !== intakeFilter) return false;
                if (yearFilter !== 'all' && p.year !== yearFilter) return false;
                if (searchTerm) {
                    const matchPaper = p.paperNo.toLowerCase().includes(searchTerm);
                    const matchQuestions = p.questions.some(q => q.text.toLowerCase().includes(searchTerm));
                    if (!matchPaper && !matchQuestions) return false;
                }
                return true;
            });
            
            const grouped = {};
            filtered.forEach(p => {
                if (!grouped[p.block]) grouped[p.block] = [];
                grouped[p.block].push(p);
            });
            
            const container = document.getElementById('papersGrid');
            const blockIcons = { block1:'📘', block2:'📗', block3:'📕', block4:'📙', block5:'📒', block6:'📓', supplementary:'📚' };
            const blockNames = { block1:'Block 1', block2:'Block 2', block3:'Block 3', block4:'Block 4', block5:'Block 5', block6:'Block 6', supplementary:'Supplementary' };
            
            if (Object.keys(grouped).length === 0) {
                container.innerHTML = '<div class="block-section"><div style="padding: 40px; text-align: center;">No papers found</div></div>';
                return;
            }
            
            container.innerHTML = Object.keys(grouped).map(block => `
                <div class="block-section">
                    <div class="block-header" onclick="toggleBlock('${block}')">
                        <div class="block-title"><span>${blockIcons[block] || '📚'}</span> ${blockNames[block] || block}</div>
                        <span class="paper-count">${grouped[block].length} papers</span>
                    </div>
                    <div id="block-${block}" class="block-content">
                        ${grouped[block].map(paper => {
                            const totalQ = paper.questions.length;
                            const mastered = paper.questions.filter((_, i) => userProgress[`${paper.id}_${i}`] === 'mastered').length;
                            const progress = totalQ ? Math.round((mastered / totalQ) * 100) : 0;
                            return `
                                <div class="paper-item ${paper.source === 'local' ? 'local' : ''}">
                                    <button class="delete-btn" onclick="deletePaper(${paper.id}); event.stopImmediatePropagation();">🗑</button>
                                    <div class="paper-header-row">
                                        <span class="paper-name">${escapeHtml(paper.paperNo)}</span>
                                        <span class="paper-intake">${paper.intake === 'march' ? 'March' : 'September'} ${paper.year}</span>
                                    </div>
                                    <div class="paper-progress">📝 ${totalQ} questions • ${progress}% mastered</div>
                                    <button class="view-btn" onclick="openPaperQuestions(${paper.id})">View Questions →</button>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleBlock(blockId) {
            const el = document.getElementById(`block-${blockId}`);
            if (el) el.classList.toggle('show');
        }

        function filterPapers() { renderPapers(); }

        function openPaperQuestions(paperId) {
            const paper = papersDatabase.find(p => p.id === paperId);
            if (!paper) return;
            
            document.getElementById('modalTitle').innerHTML = `<i class="fas fa-book"></i> ${escapeHtml(paper.paperNo)}`;
            document.getElementById('modalMeta').innerHTML = `${paper.blockName} | ${paper.intake === 'march' ? 'March' : 'September'} ${paper.year} | ${paper.questions.length} questions`;
            
            const container = document.getElementById('modalQuestions');
            container.innerHTML = paper.questions.map((q, idx) => {
                const key = `${paper.id}_${idx}`;
                const isFavorite = favorites.includes(key);
                const answerText = q.answer || 'Answer not provided';
                const rationaleText = q.rationale || 'No detailed rationale provided yet.';

                return `
                    <div class="single-question">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                            <div class="question-text-full">${idx + 1}. ${escapeHtml(q.text)}</div>
                            <button class="favorite-btn ${isFavorite ? 'favorited' : ''}" onclick="toggleFavorite(${paper.id}, ${idx}, this)">❤️</button>
                        </div>
                        <button class="reveal-q" onclick="toggleAnswer(this)">
                            <i class="fas fa-lightbulb"></i> Reveal Answer
                        </button>
                        <div class="answer-full">
                            <i class="fas fa-graduation-cap" style="color:#0891b2;margin-right:8px;"></i>
                            ${escapeHtml(answerText).replace(/\n/g, '<br>')}
                            <div class="rationale">
                                <strong>Rationale:</strong><br>${escapeHtml(rationaleText).replace(/\n/g, '<br>')}
                            </div>
                        </div>
                        <div class="progress-btns">
                            <button class="progress-btn-sm progress-attempted" onclick="updateProgress(${paper.id}, ${idx}, 'attempted')">⚠️ Attempted</button>
                            <button class="progress-btn-sm progress-reviewed" onclick="updateProgress(${paper.id}, ${idx}, 'reviewed')">🔄 Reviewed</button>
                            <button class="progress-btn-sm progress-mastered" onclick="updateProgress(${paper.id}, ${idx}, 'mastered')">🏆 Mastered</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('questionModal').classList.add('show');
        }

        function toggleFavorite(paperId, qIndex, btn) {
            const key = `${paperId}_${qIndex}`;
            if (favorites.includes(key)) {
                favorites = favorites.filter(k => k !== key);
                btn.classList.remove('favorited');
            } else {
                favorites.push(key);
                btn.classList.add('favorited');
            }
            localStorage.setItem('nurseFavorites', JSON.stringify(favorites));
        }

        function toggleAnswer(btn) {
            const answerDiv = btn.nextElementSibling;
            if (answerDiv) answerDiv.classList.toggle('show');
        }

        function closeQuestionModal() {
            document.getElementById('questionModal').classList.remove('show');
        }

        function updateProgress(paperId, qIndex, status) {
            userProgress[`${paperId}_${qIndex}`] = status;
            localStorage.setItem('nurseProgress', JSON.stringify(userProgress));
            updateProgressStats();
            renderPapers();
            renderProgressList();
        }

        function updateProgressStats() {
            let total = 0, attempted = 0, mastered = 0;
            papersDatabase.forEach(paper => {
                paper.questions.forEach((_, idx) => {
                    total++;
                    const s = userProgress[`${paper.id}_${idx}`];
                    if (s) attempted++;
                    if (s === 'mastered') mastered++;
                });
            });
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statAttempted').textContent = attempted;
            document.getElementById('statMastered').textContent = mastered;
        }

        function renderProgressList() {
            const container = document.getElementById('progressList');
            let html = '';
            papersDatabase.forEach(paper => {
                paper.questions.forEach((q, idx) => {
                    const status = userProgress[`${paper.id}_${idx}`];
                    if (status) {
                        html += `
                            <div class="paper-item" style="cursor:pointer;" onclick="openPaperQuestions(${paper.id})">
                                <div class="paper-header-row">
                                    <span class="paper-name">${escapeHtml(paper.paperNo)}</span>
                                    <span class="paper-intake">${paper.intake === 'march' ? 'March' : 'September'} ${paper.year}</span>
                                </div>
                                <div style="font-size:12px;margin-top:6px;">${escapeHtml(q.text.substring(0,80))}...</div>
                                <div style="margin-top:6px;">
                                    <span style="background:${status === 'mastered' ? '#dcfce7' : '#fef3c7'};padding:2px 8px;border-radius:12px;font-size:10px;">
                                        ${status === 'mastered' ? '✅ Mastered' : status === 'reviewed' ? '🔄 Reviewed' : '⚠️ Attempted'}
                                    </span>
                                </div>
                            </div>`;
                    }
                });
            });
            container.innerHTML = html || '<div class="block-section"><div style="padding:40px;text-align:center;">No progress yet. Start practicing!</div></div>';
        }

        function startRandomQuiz() {
            if (papersDatabase.length === 0) return alert("No papers loaded.");
            let allQs = [];
            papersDatabase.forEach(p => {
                p.questions.forEach((q, i) => allQs.push({paperId: p.id, qIndex: i}));
            });
            allQs.sort(() => Math.random() - 0.5);
            const selected = allQs.slice(0, 10);
            if (selected.length > 0) {
                alert(`Starting Random Quiz with ${selected.length} questions!`);
                openPaperQuestions(selected[0].paperId);
            }
        }

        function refreshSheet() {
            if (confirm("Refresh from Google Sheet? Local papers will stay.")) {
                localStorage.removeItem('nursePapersCache');
                loadFromGoogleSheet();
            }
        }

        function exportProgressCSV() {
            let csv = "Paper,Question,Status\n";
            papersDatabase.forEach(paper => {
                paper.questions.forEach((q, idx) => {
                    const status = userProgress[`${paper.id}_${idx}`];
                    if (status) {
                        csv += `"${paper.paperNo.replace(/"/g,'""')}","${q.text.replace(/"/g,'""').substring(0,100)}...",${status}\n`;
                    }
                });
            });
            const blob = new Blob([csv], {type: 'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `NursePrep_Progress_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            alert('Progress exported successfully!');
        }

        function clearAllProgress() {
            if (!confirm('Reset ALL progress? This cannot be undone.')) return;
            userProgress = {};
            localStorage.setItem('nurseProgress', JSON.stringify(userProgress));
            updateProgressStats();
            renderPapers();
            renderProgressList();
            alert('All progress has been cleared.');
        }

        function deletePaper(paperId) {
            if (!confirm('Delete this locally added paper permanently?')) return;
            papersDatabase = papersDatabase.filter(p => p.id !== paperId);
            let localPapers = JSON.parse(localStorage.getItem('nurseLocalPapers') || '[]');
            localPapers = localPapers.filter(p => p.id !== paperId);
            localStorage.setItem('nurseLocalPapers', JSON.stringify(localPapers));
            localStorage.setItem('nursePapersCache', JSON.stringify(papersDatabase));
            renderPapers();
            updateProgressStats();
            renderProgressList();
        }

        async function submitToSheet() {
            const block = document.getElementById('newBlock').value;
            const paperNo = document.getElementById('newPaperNo').value.trim();
            const intake = document.getElementById('newIntake').value;
            const year = document.getElementById('newYear').value.trim() || '2024';
            const title = document.getElementById('newTitle').value.trim();
            const valid = questionFields.filter(q => q.text.trim());

            if (!paperNo) return alert('Enter Paper Number');
            if (valid.length === 0) return alert('Add at least one question');
            if (WEB_APP_URL.includes("YOUR_WEB_APP_URL_HERE")) return alert('Please replace YOUR_WEB_APP_URL_HERE with your actual Web App URL.');

            const payload = {
                block: block,
                paperNo: paperNo,
                intake: intake,
                year: year,
                title: title || paperNo,
                questions: valid.map(q => q.text),
                answers: valid.map(q => q.answer || ''),
                rationales: valid.map(q => q.rationale || '')
            };

            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'application/json' }
                });
                const result = await res.json();
                if (result.status === "success") {
                    document.getElementById('sheetSuccessMsg').style.display = 'block';
                    setTimeout(() => document.getElementById('sheetSuccessMsg').style.display = 'none', 6000);
                    document.getElementById('newPaperNo').value = '';
                    document.getElementById('newYear').value = '';
                    document.getElementById('newTitle').value = '';
                    questionFields = [];
                    renderQuestionFields();
                } else {
                    alert('Submission failed: ' + (result.message || 'Unknown error'));
                }
            } catch (err) {
                alert('Could not connect to Google Sheet. Make sure your Web App is deployed with "Anyone" access.');
            }
        }

        function savePaperLocal() {
            const block = document.getElementById('newBlock').value;
            const paperNo = document.getElementById('newPaperNo').value.trim();
            const intake = document.getElementById('newIntake').value;
            const year = document.getElementById('newYear').value.trim() || '2024';
            const title = document.getElementById('newTitle').value.trim();
            const validQuestions = questionFields.filter(q => q.text.trim());

            if (!paperNo) return alert('Enter Paper Number');
            if (validQuestions.length === 0) return alert('Add at least one question');

            const newId = papersDatabase.length ? Math.max(...papersDatabase.map(p => p.id)) + 1 : 1;
            const blockNames = { block1:'Block 1', block2:'Block 2', block3:'Block 3', block4:'Block 4', block5:'Block 5', block6:'Block 6', supplementary:'Supplementary' };

            const newPaper = {
                id: newId,
                block: block,
                blockName: blockNames[block] || block,
                paperNo: paperNo,
                intake: intake,
                year: year,
                title: title || paperNo,
                questions: validQuestions.map(q => ({ text: q.text, answer: q.answer || '', rationale: q.rationale || '' })),
                source: 'local'
            };

            papersDatabase.push(newPaper);
            let localPapers = JSON.parse(localStorage.getItem('nurseLocalPapers') || '[]');
            localPapers.push(newPaper);
            localStorage.setItem('nurseLocalPapers', JSON.stringify(localPapers));
            localStorage.setItem('nursePapersCache', JSON.stringify(papersDatabase));

            document.getElementById('addSuccessMsg').style.display = 'block';
            setTimeout(() => document.getElementById('addSuccessMsg').style.display = 'none', 3000);

            document.getElementById('newPaperNo').value = '';
            document.getElementById('newYear').value = '';
            document.getElementById('newTitle').value = '';
            questionFields = [];
            renderQuestionFields();

            renderPapers();
            updateProgressStats();
            document.querySelector('.tab-btn[data-tab="papers"]').click();
        }

        function addQuestionField(text = '', answer = '', rationale = '') {
            const container = document.getElementById('questionsContainer');
            const index = questionFields.length;
            questionFields.push({ text, answer, rationale });
            
            const div = document.createElement('div');
            div.className = 'question-entry';
            div.innerHTML = `
                <textarea placeholder="Question" rows="2" style="width:100%;margin-bottom:8px;">${escapeHtml(text)}</textarea>
                <textarea placeholder="Answer" rows="3" style="width:100%;margin-bottom:8px;">${escapeHtml(answer)}</textarea>
                <textarea placeholder="Rationale (optional)" rows="2" style="width:100%;">${escapeHtml(rationale)}</textarea>
                <button class="remove-q" onclick="removeQuestion(${index})">Remove Question</button>
            `;
            const tas = div.querySelectorAll('textarea');
            tas[0].addEventListener('input', e => questionFields[index].text = e.target.value);
            tas[1].addEventListener('input', e => questionFields[index].answer = e.target.value);
            tas[2].addEventListener('input', e => questionFields[index].rationale = e.target.value);
            container.appendChild(div);
        }

        function removeQuestion(index) {
            questionFields.splice(index, 1);
            renderQuestionFields();
        }

        function renderQuestionFields() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            questionFields.forEach((q, i) => addQuestionField(q.text, q.answer, q.rationale));
        }

        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(`${btn.dataset.tab}Tab`).classList.add('active');
                    if (btn.dataset.tab === 'progress') renderProgressList();
                });
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }

        let darkMode = localStorage.getItem('darkMode') === 'true';
        function toggleDarkMode() {
            darkMode = !darkMode;
            localStorage.setItem('darkMode', darkMode);
            document.body.classList.toggle('dark', darkMode);
        }

        function shareApp() {
            if (navigator.share) {
                navigator.share({ title: 'NursePrep Pro', text: 'Collaborative nursing past papers!', url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Link copied to clipboard!');
            }
        }

        // Initialize everything
        document.getElementById('searchInput').addEventListener('input', filterPapers);
        setupTabs();
        if (darkMode) document.body.classList.add('dark');
        
        window.onload = () => {
            loadFromGoogleSheet();
            setTimeout(() => {
                if (questionFields.length === 0) addQuestionField();
            }, 800);
        };

        // Expose all functions to window
        window.toggleBlock = toggleBlock;
        window.filterPapers = filterPapers;
        window.openPaperQuestions = openPaperQuestions;
        window.toggleAnswer = toggleAnswer;
        window.closeQuestionModal = closeQuestionModal;
        window.toggleFavorite = toggleFavorite;
        window.addQuestionField = addQuestionField;
        window.removeQuestion = removeQuestion;
        window.savePaperLocal = savePaperLocal;
        window.submitToSheet = submitToSheet;
        window.updateProgress = updateProgress;
        window.toggleDarkMode = toggleDarkMode;
        window.shareApp = shareApp;
        window.startRandomQuiz = startRandomQuiz;
        window.refreshSheet = refreshSheet;
        window.exportProgressCSV = exportProgressCSV;
        window.clearAllProgress = clearAllProgress;
        window.deletePaper = deletePaper;
        window.installPWA = installPWA;
    </script>
</body>
</html>
