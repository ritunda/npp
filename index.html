<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>NursePrep Pro | Nursing Past Papers</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
            color: #0f172a;
            /* Safe area insets – fixes header overlap */

            padding-right: env(safe-area-inset-right);
        }

        body.dark {
            background: #0a0c10;
            color: #e2e8f0;
        }

        /* Minimal Header – compensates for body padding */

            background: white;
            padding: 10px 16px;

            top: 0;
            z-index: 100;
            margin-top: calc(env(safe-area-inset-top) * -1);

            background: #1e293b;

        }

            display: flex;

            justify-content: space-between;
            max-width: 800px;
            margin: 0 auto;
        }

        .logo-mini {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon-mini {
            width: 36px;
            height: 36px;

            align-items: center;

        }

        .logo-icon-mini i {

        }

        .logo-text-mini h1 {

        }

        body.dark .logo-text-mini h1 {
            color: #22d3ee;
        }

        .logo-text-mini p {
            font-size: 10px;
            color: #64748b;
        }

        .header-actions-mini {
            display: flex;
            gap: 8px;
        }

        .icon-btn-mini {
            width: 36px;
            height: 36px;
            border-radius: 18px;
            background: #f1f5f9;
            border: none;
            cursor: pointer;
            display: flex;

            justify-content: center;
            color: #1e293b;
        }

        body.dark .icon-btn-mini {

            color: #e2e8f0;
        }

        /* Main container */
        .main-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Tabs */
        .tab-bar {
            display: flex;

        body.dark .tab-bar {

        .tab-btn {

            padding: 10px 0;

            background: transparent;
            border-radius: 40px;

            font-size: 12px;

            justify-content: center;

        }

        .tab-pane {

        }

        .tab-pane.active {

        }

        /* Filters */
        .filter-bar {
            background: white;
            border-radius: 20px;

        }

        body.dark .filter-bar {

        }

        .filter-row {

        }

        .filter-select {

        .search-mini {

        body.dark .block-section {

        .block-header {

        .block-content {

            gap: 12px;

        .form-row .form-group {

        /* Modal */

            left: 0;

            background: #1e293b;

            border-bottom: 1px solid #e2e8f0;
        }

            font-size: 16px;

            margin-bottom: 12px;

        .reveal-q {

            border: none;
            padding: 10px 20px;

        }

            background: #f8fafc;
            padding: 16px;
            border-radius: 16px;
            margin-top: 12px;
            display: none;
            border-left: 4px solid #0891b2;
            line-height: 1.6;
            font-size: 14px;
        }

        body.dark .answer-full {
            background: #0f172a;
        }

        .answer-full.show {
            display: block;
        }

        .progress-btns {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .progress-btn-sm {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }

        .progress-attempted {
            background: #fef3c7;
            color: #d97706;
        }

        .progress-reviewed {
            background: #dcfce7;
            color: #16a34a;
        }

        .progress-mastered {
            background: #dbeafe;
            color: #2563eb;
        }

        .close-modal {
            background: #e2e8f0;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            width: 100%;
            margin-top: 16px;
            cursor: pointer;
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #0891b2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .warning-msg {
            background: #fef3c7;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 12px;
            color: #92400e;
        }

        body.dark .warning-msg {
            background: #451a03;
            color: #fbbf24;
        }
    </style>
</head>
<body>
    <div class="minimal-header">
        <div class="header-row">
            <div class="logo-mini">
                <div class="logo-icon-mini"><i class="fas fa-stethoscope"></i></div>
                <div class="logo-text-mini">
                    <h1>NursePrep Pro</h1>
                    <p>Block 1-6 | Past Papers</p>
                </div>
            </div>
            <div class="header-actions-mini">
                <button class="icon-btn-mini" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
                <button class="icon-btn-mini" onclick="shareApp()"><i class="fas fa-share-alt"></i></button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="papers"><i class="fas fa-book"></i> Papers</button>
            <button class="tab-btn" data-tab="add"><i class="fas fa-plus-circle"></i> Add</button>
            <button class="tab-btn" data-tab="progress"><i class="fas fa-chart-line"></i> Progress</button>
        </div>

        <!-- Papers Tab -->
        <div id="papersTab" class="tab-pane active">
            <div class="filter-bar">
                <div class="filter-row">
                    <select id="blockFilter" class="filter-select" onchange="filterPapers()">
                        <option value="all">All Blocks</option>
                        <option value="block1">Block 1</option>
                        <option value="block2">Block 2</option>
                        <option value="block3">Block 3</option>
                        <option value="block4">Block 4</option>
                        <option value="block5">Block 5</option>
                        <option value="block6">Block 6</option>
                        <option value="supplementary">Supplementary</option>
                    </select>
                    <select id="intakeFilter" class="filter-select" onchange="filterPapers()">
                        <option value="all">All Intakes</option>
                        <option value="march">March</option>
                        <option value="september">September</option>
                    </select>
                    <select id="yearFilter" class="filter-select" onchange="filterPapers()">
                        <option value="all">All Years</option>
                        <option value="2024">2024</option>
                        <option value="2023">2023</option>
                        <option value="2022">2022</option>
                    </select>
                </div>
                <input type="text" id="searchInput" class="search-mini" placeholder="Search questions...">
            </div>
            <div id="papersGrid"><div class="loading-spinner"><div class="spinner"></div><p>Loading questions...</p></div></div>
        </div>

        <!-- Add Paper Tab -->
        <div id="addTab" class="tab-pane">
            <div class="add-form">
                <div id="addSuccessMsg" class="success-msg"><i class="fas fa-check-circle"></i> Paper added!</div>
                <div class="form-row">
                    <div class="form-group"><label>Block</label><select id="newBlock"><option value="block1">Block 1</option><option value="block2">Block 2</option><option value="block3">Block 3</option><option value="block4">Block 4</option><option value="block5">Block 5</option><option value="block6">Block 6</option><option value="supplementary">Supplementary</option></select></div>
                    <div class="form-group"><label>Paper No.</label><input type="text" id="newPaperNo" placeholder="Paper 1"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Intake</label><select id="newIntake"><option value="march">March</option><option value="september">September</option></select></div>
                    <div class="form-group"><label>Year</label><input type="text" id="newYear" placeholder="2024"></div>
                </div>
                <div class="form-group"><label>Paper Title</label><input type="text" id="newTitle" placeholder="e.g., Fundamentals of Nursing"></div>
                <div id="questionsContainer"></div>
                <button class="add-question-btn" onclick="addQuestionField()"><i class="fas fa-plus"></i> Add Question</button>
                <button class="submit-btn" onclick="savePaper()"><i class="fas fa-save"></i> Save Paper</button>
            </div>
        </div>

        <!-- Progress Tab -->
        <div id="progressTab" class="tab-pane">
            <div class="stats-bar">
                <div class="stat-mini"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Total Qs</div></div>
                <div class="stat-mini"><div class="stat-num" id="statAttempted">0</div><div class="stat-label">Attempted</div></div>
                <div class="stat-mini"><div class="stat-num" id="statMastered">0</div><div class="stat-label">Mastered</div></div>
            </div>
            <div id="progressList"></div>
        </div>
    </div>

    <!-- Question Modal -->
    <div id="questionModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <p id="modalMeta" style="font-size: 12px; color: #64748b; margin-bottom: 16px;"></p>
            <div id="modalQuestions"></div>
            <button class="close-modal" onclick="closeQuestionModal()">Close</button>
        </div>
    </div>

    <script>
        // ============ CONFIGURATION ============
        const GOOGLE_SHEET_ID = "1She5pa77A5kRnqn6_zHiStN5BYjd5ma2KNZB_oyPmx8";

        let papersDatabase = [];
        let userProgress = JSON.parse(localStorage.getItem('nurseProgress')) || {};
        let questionFields = [];

        // ============ LOAD FROM GOOGLE SHEET ============
        async function loadFromGoogleSheet() {
            const container = document.getElementById('papersGrid');
            container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Loading questions...</p></div>';

            try {
                const csvUrl = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/gviz/tq?tqx=out:csv`;
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                const papers = parseCSVToPapers(csvText);

                if (papers.length > 0) {
                    papersDatabase = papers;
                    localStorage.setItem('nursePapersCache', JSON.stringify(papersDatabase));
                    renderPapers();
                    updateProgressStats();
                    renderProgressList();
                } else {
                    const cached = localStorage.getItem('nursePapersCache');
                    if (cached) {
                        papersDatabase = JSON.parse(cached);
                        renderPapers();
                        updateProgressStats();
                        renderProgressList();
                        showMessage("Using cached data. Make sure your Google Sheet has headers: id, block, paper, intake, year, question, answer", "warning");
                    } else {
                        container.innerHTML = '<div class="block-section"><div style="padding: 40px; text-align: center;">⚠️ No questions found.<br><br>Make sure your Google Sheet has:<br><strong>Row 1 headers:</strong> id, block, paper, intake, year, question, answer<br><br>And is published to web (File → Share → Publish to web)</div></div>';
                    }
                }
            } catch (error) {
                console.error("Error loading:", error);
                const cached = localStorage.getItem('nursePapersCache');
                if (cached) {
                    papersDatabase = JSON.parse(cached);
                    renderPapers();
                    updateProgressStats();
                    renderProgressList();
                    showMessage("Could not connect to Google Sheet. Using cached data. Make sure sheet is published to web.", "warning");
                } else {
                    container.innerHTML = '<div class="block-section"><div style="padding: 40px; text-align: center;">⚠️ Could not load from Google Sheet.<br><br>Make sure:<br>1. Sheet is published to web (File → Share → Publish to web)<br>2. Sheet has headers in Row 1</div></div>';
                }
            }
        }

        function parseCSVToPapers(csvText) {
            const lines = csvText.split('\n').filter(l => l.trim());
            if (lines.length < 2) return [];

            // Parse headers
            let headers = [];
            let inQuotes = false;
            let current = '';
            for (let char of lines[0]) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    headers.push(current.trim().toLowerCase());
                    current = '';
                } else current += char;
            }
            headers.push(current.trim().toLowerCase());

            const idIdx = headers.indexOf('id');
            const blockIdx = headers.indexOf('block');
            const paperIdx = headers.indexOf('paper');
            const intakeIdx = headers.indexOf('intake');
            const yearIdx = headers.indexOf('year');
            const questionIdx = headers.indexOf('question');
            const answerIdx = headers.indexOf('answer');

            const papersMap = new Map();

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;

                let values = [];
                inQuotes = false;
                current = '';
                for (let char of lines[i]) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else current += char;
                }
                values.push(current.trim());
                values = values.map(v => v.replace(/^["']|["']$/g, ''));

                const id = idIdx >= 0 && values[idIdx] ? parseInt(values[idIdx]) || i : i;
                const block = blockIdx >= 0 && values[blockIdx] ? values[blockIdx] : 'supplementary';
                const paper = paperIdx >= 0 && values[paperIdx] ? values[paperIdx] : `Paper ${id}`;
                const intake = intakeIdx >= 0 && values[intakeIdx] ? values[intakeIdx].toLowerCase() : 'march';
                const year = yearIdx >= 0 && values[yearIdx] ? values[yearIdx] : '2024';
                const question = questionIdx >= 0 && values[questionIdx] ? values[questionIdx] : '';
                const answer = answerIdx >= 0 && values[answerIdx] ? values[answerIdx] : 'Answer not provided';

                if (!question) continue;

                if (!papersMap.has(id)) {
                    const blockNames = {
                        'block1': 'Block 1', 'block2': 'Block 2', 'block3': 'Block 3',
                        'block4': 'Block 4', 'block5': 'Block 5', 'block6': 'Block 6',
                        'supplementary': 'Supplementary'
                    };
                    papersMap.set(id, {
                        id: id,
                        block: block,
                        blockName: blockNames[block] || block,
                        paperNo: paper,
                        intake: intake,
                        year: year,
                        title: `${paper} - ${blockNames[block] || block}`,
                        questions: []
                    });
                }
                papersMap.get(id).questions.push({ text: question, answer: answer });
            }
            return Array.from(papersMap.values());
        }

        function showMessage(msg, type) {
            const container = document.getElementById('papersGrid');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'warning-msg';
            msgDiv.innerHTML = `<i class="fas fa-info-circle"></i> ${msg}`;
            if (container.firstChild) container.insertBefore(msgDiv, container.firstChild);
            else container.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 5000);
        }

        function renderPapers() {
            const blockFilter = document.getElementById('blockFilter').value;
            const intakeFilter = document.getElementById('intakeFilter').value;
            const yearFilter = document.getElementById('yearFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            let filtered = papersDatabase.filter(p => {
                if (blockFilter !== 'all' && p.block !== blockFilter) return false;
                if (intakeFilter !== 'all' && p.intake !== intakeFilter) return false;
                if (yearFilter !== 'all' && p.year !== yearFilter) return false;
                if (searchTerm) {
                    const matchPaper = p.paperNo.toLowerCase().includes(searchTerm);
                    const matchQuestions = p.questions.some(q => q.text.toLowerCase().includes(searchTerm));
                    if (!matchPaper && !matchQuestions) return false;
                }
                return true;
            });

            const grouped = {};
            filtered.forEach(p => { if (!grouped[p.block]) grouped[p.block] = []; grouped[p.block].push(p); });

            const container = document.getElementById('papersGrid');
            const blockIcons = { block1:'📘', block2:'📗', block3:'📕', block4:'📙', block5:'📒', block6:'📓', supplementary:'📚' };
            const blockNames = { block1:'Block 1', block2:'Block 2', block3:'Block 3', block4:'Block 4', block5:'Block 5', block6:'Block 6', supplementary:'Supplementary' };

            if (Object.keys(grouped).length === 0) {
                container.innerHTML = '<div class="block-section"><div style="padding: 40px; text-align: center;">No papers found</div></div>';
                return;
            }

            container.innerHTML = Object.keys(grouped).map(block => `
                <div class="block-section">
                    <div class="block-header" onclick="toggleBlock('${block}')">
                        <div class="block-title"><span>${blockIcons[block] || '📚'}</span> ${blockNames[block] || block}</div>
                        <span class="paper-count">${grouped[block].length} papers</span>
                    </div>
                    <div id="block-${block}" class="block-content">
                        ${grouped[block].map(paper => `
                            <div class="paper-item">
                                <div class="paper-header-row">
                                    <span class="paper-name">${escapeHtml(paper.paperNo)}</span>
                                    <span class="paper-intake">${paper.intake === 'march' ? 'March' : 'September'} ${paper.year}</span>
                                </div>
                                <div style="font-size: 11px; color: #64748b;">📝 ${paper.questions.length} questions</div>
                                <button class="view-btn" onclick="openPaperQuestions(${paper.id})">View Questions →</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleBlock(blockId) {
            const el = document.getElementById(`block-${blockId}`);
            if (el) el.classList.toggle('show');
        }

        function filterPapers() { renderPapers(); }

        function openPaperQuestions(paperId) {
            const paper = papersDatabase.find(p => p.id === paperId);
            if (!paper) return;

            document.getElementById('modalTitle').innerHTML = `<i class="fas fa-book"></i> ${escapeHtml(paper.paperNo)}`;
            document.getElementById('modalMeta').innerHTML = `${paper.blockName} | ${paper.intake === 'march' ? 'March' : 'September'} ${paper.year} | ${paper.questions.length} questions`;

            const container = document.getElementById('modalQuestions');
            container.innerHTML = paper.questions.map((q, idx) => {
                const status = userProgress[`${paper.id}_${idx}`] || 'none';
                return `
                    <div class="single-question">
                        <div class="question-text-full">${idx + 1}. ${escapeHtml(q.text)}</div>
                        <button class="reveal-q" onclick="toggleAnswer(${idx})">
                            <i class="fas fa-lightbulb"></i> Reveal Answer
                        </button>
                        <div id="answer-${idx}" class="answer-full">
                            <i class="fas fa-graduation-cap" style="color: #0891b2; margin-right: 8px;"></i>
                            ${escapeHtml(q.answer).replace(/\n/g, '<br>')}
                        </div>
                        <div class="progress-btns">
                            <button class="progress-btn-sm progress-attempted" onclick="updateProgress(${paper.id}, ${idx}, 'attempted')">⚠️ Attempted</button>
                            <button class="progress-btn-sm progress-reviewed" onclick="updateProgress(${paper.id}, ${idx}, 'reviewed')">🔄 Reviewed</button>
                            <button class="progress-btn-sm progress-mastered" onclick="updateProgress(${paper.id}, ${idx}, 'mastered')">🏆 Mastered</button>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('questionModal').classList.add('show');
        }

        function toggleAnswer(idx) {
            const el = document.getElementById(`answer-${idx}`);
            if (el) el.classList.toggle('show');
        }

        function closeQuestionModal() {
            document.getElementById('questionModal').classList.remove('show');
        }

        function updateProgress(paperId, qIndex, status) {
            userProgress[`${paperId}_${qIndex}`] = status;
            localStorage.setItem('nurseProgress', JSON.stringify(userProgress));
            updateProgressStats();
            renderProgressList();
        }

        function updateProgressStats() {
            let total = 0, attempted = 0, mastered = 0;
            papersDatabase.forEach(paper => {
                paper.questions.forEach((_, idx) => {
                    total++;
                    const s = userProgress[`${paper.id}_${idx}`];
                    if (s === 'attempted' || s === 'reviewed' || s === 'mastered') attempted++;
                    if (s === 'mastered') mastered++;
                });
            });
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statAttempted').textContent = attempted;
            document.getElementById('statMastered').textContent = mastered;
        }

        function renderProgressList() {
            const container = document.getElementById('progressList');
            const items = [];
            papersDatabase.forEach(paper => {
                paper.questions.forEach((q, idx) => {
                    const status = userProgress[`${paper.id}_${idx}`];
                    if (status) {
                        items.push(`
                            <div class="paper-item" style="cursor:pointer;" onclick="openPaperQuestions(${paper.id})">
                                <div class="paper-header-row">
                                    <span class="paper-name">${escapeHtml(paper.paperNo)}</span>
                                    <span class="paper-intake">${paper.intake === 'march' ? 'March' : 'September'} ${paper.year}</span>
                                </div>
                                <div style="font-size: 12px; margin-top: 6px;">${escapeHtml(q.text.substring(0, 80))}...</div>
                                <div style="margin-top: 6px;"><span style="background:${status === 'mastered' ? '#dcfce7' : '#fef3c7'}; padding:2px 8px; border-radius:12px; font-size:10px;">${status === 'mastered' ? '✅ Mastered' : status === 'reviewed' ? '🔄 Reviewed' : '⚠️ Attempted'}</span></div>
                            </div>
                        `);
                    }
                });
            });
            container.innerHTML = items.length ? items.join('') : '<div class="block-section"><div style="padding: 40px; text-align: center;">No progress yet. Start practicing!</div></div>';
        }

        // ============ ADD PAPER FUNCTIONS ============
        function addQuestionField(text = '', answer = '') {
            const container = document.getElementById('questionsContainer');
            const index = questionFields.length;
            questionFields.push({ text, answer });

            const div = document.createElement('div');
            div.className = 'question-entry';
            div.innerHTML = `
                <textarea placeholder="Question" rows="2" style="width:100%; margin-bottom:8px; padding:10px; border-radius:12px; border:1px solid #e2e8f0;">${escapeHtml(text)}</textarea>
                <textarea placeholder="Answer" rows="3" style="width:100%; padding:10px; border-radius:12px; border:1px solid #e2e8f0;">${escapeHtml(answer)}</textarea>
                <button class="remove-q" onclick="removeQuestion(${index})">Remove Question</button>
            `;
            const qTextarea = div.querySelector('textarea:first-of-type');
            const aTextarea = div.querySelector('textarea:last-of-type');
            qTextarea.addEventListener('input', (e) => { questionFields[index].text = e.target.value; });
            aTextarea.addEventListener('input', (e) => { questionFields[index].answer = e.target.value; });
            container.appendChild(div);
        }

        function removeQuestion(index) {
            questionFields.splice(index, 1);
            renderQuestionFields();
        }

        function renderQuestionFields() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            questionFields.forEach((q, i) => {
                const div = document.createElement('div');
                div.className = 'question-entry';
                div.innerHTML = `
                    <textarea placeholder="Question" rows="2" style="width:100%; margin-bottom:8px; padding:10px; border-radius:12px; border:1px solid #e2e8f0;">${escapeHtml(q.text)}</textarea>
                    <textarea placeholder="Answer" rows="3" style="width:100%; padding:10px; border-radius:12px; border:1px solid #e2e8f0;">${escapeHtml(q.answer)}</textarea>
                    <button class="remove-q" onclick="removeQuestion(${i})">Remove Question</button>
                `;
                const qTextarea = div.querySelector('textarea:first-of-type');
                const aTextarea = div.querySelector('textarea:last-of-type');
                qTextarea.addEventListener('input', (e) => { questionFields[i].text = e.target.value; });
                aTextarea.addEventListener('input', (e) => { questionFields[i].answer = e.target.value; });
                container.appendChild(div);
            });
        }

        function savePaper() {
            const block = document.getElementById('newBlock').value;
            const paperNo = document.getElementById('newPaperNo').value.trim();
            const intake = document.getElementById('newIntake').value;
            const year = document.getElementById('newYear').value.trim();
            const title = document.getElementById('newTitle').value.trim();
            const validQuestions = questionFields.filter(q => q.text.trim());

            if (!paperNo) { alert('Enter Paper Number'); return; }
            if (validQuestions.length === 0) { alert('Add at least one question'); return; }

            const newId = papersDatabase.length > 0 ? Math.max(...papersDatabase.map(p => p.id)) + 1 : 1;
            const blockNames = { block1:'Block 1', block2:'Block 2', block3:'Block 3', block4:'Block 4', block5:'Block 5', block6:'Block 6', supplementary:'Supplementary' };

            papersDatabase.push({
                id: newId, block: block, blockName: blockNames[block],
                paperNo: paperNo, intake: intake, year: year || '2024',
                title: title || `${paperNo} - ${blockNames[block]}`,
                questions: validQuestions.map(q => ({ text: q.text, answer: q.answer }))
            });

            localStorage.setItem('nursePapersDB', JSON.stringify(papersDatabase));
            document.getElementById('newPaperNo').value = '';
            document.getElementById('newYear').value = '';
            document.getElementById('newTitle').value = '';
            questionFields = [];
            renderQuestionFields();

            const msg = document.getElementById('addSuccessMsg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
            renderPapers();
            updateProgressStats();
            document.querySelector('.tab-btn[data-tab="papers"]').click();
        }

        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tab = btn.dataset.tab;
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(`${tab}Tab`).classList.add('active');
                    if (tab === 'progress') renderProgressList();
                });
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        let darkMode = localStorage.getItem('darkMode') === 'true';
        function toggleDarkMode() {
            darkMode = !darkMode;
            localStorage.setItem('darkMode', darkMode);
            document.body.classList.toggle('dark', darkMode);
            document.querySelector('.icon-btn-mini i').className = darkMode ? 'fas fa-sun' : 'fas fa-moon';
        }

        function shareApp() {
            if (navigator.share) {
                navigator.share({ title: 'NursePrep Pro', text: 'Nursing past papers organized by blocks!', url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Link copied!');
            }
        }

        // Initialization
        document.getElementById('searchInput').addEventListener('input', filterPapers);
        setupTabs();
        if (darkMode) document.body.classList.add('dark');
        loadFromGoogleSheet();

        window.toggleBlock = toggleBlock;
        window.filterPapers = filterPapers;
        window.openPaperQuestions = openPaperQuestions;
        window.toggleAnswer = toggleAnswer;
        window.closeQuestionModal = closeQuestionModal;
        window.addQuestionField = addQuestionField;
        window.removeQuestion = removeQuestion;
        window.savePaper = savePaper;
        window.updateProgress = updateProgress;
        window.toggleDarkMode = toggleDarkMode;
        window.shareApp = shareApp;
    </script>
</body>
</html>
